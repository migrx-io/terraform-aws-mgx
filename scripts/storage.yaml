apiVersion: v1
kind: api
metadata:
  plugin:
    storage:
      config: add
spec:
  name: {name}
  storage_bucket: {s3_bucket_name}
  storage_s3purge: "yes"
  cache_r_cache_size: 4096
  cache_rw_cache_size: 1024
  qos_rw_ios_per_sec: 16000
  qos_rw_mbytes_per_sec: 250
  qos_r_mbytes_per_sec: 250
  qos_w_mbytes_per_sec: 250
  raid_bdev_retry_count: 0
  raid_ctrlr_loss_timeout_sec: 90
  raid_reconnect_delay_sec: 2
  raid_fast_io_fail_timeout_sec: 0
---
apiVersion: v1
kind: api
metadata:
  plugin:
    scheduler:
      config: add
spec:
  bucket_selector: {s3_bucket_name}
  default: "yes"
  enabled: "yes"
  labels: "default=yes"
  name: {name}
  node_selector: null
  pool_selector: null
---
apiVersion: v1
kind: api
metadata:
  plugin:
    snapshot:
      config: add
spec:
  name: {name}
  src_bucket: {s3_bucket_name}
  dst_bucket: {s3_backup_bucket}
  storage_class: GLACIER_IR
  transfers: 4
  checkers: 8
  max_running: 5
  max_increments: 5
